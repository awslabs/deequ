// Constraint suggestion surface: DeequConstraintSuggestionRelation envelope.

syntax = "proto3";

package com.amazon.deequ.connect;

option java_multiple_files = true;
option java_package = "com.amazon.deequ.connect.proto";

import "common.proto";

// ============================================================================
// DeequConstraintSuggestionRelation — Spark Connect Relation extension envelope.
// ============================================================================

message DeequConstraintSuggestionRelation {
  bytes input_relation                               = 1;
  repeated ConstraintRuleSet constraint_rules        = 2;
  repeated string restrict_to_columns                = 3;
  optional int32 low_cardinality_histogram_threshold = 4;
  bool enable_kll_profiling                          = 5;
  KLLParameters kll_parameters                       = 6;
  map<string, string> predefined_types               = 7;
  optional double testset_ratio                      = 8;   // (0,1) — server-side disabled if unset
  optional int64 testset_split_random_seed           = 9;   // any int64; unset = no seed
}
