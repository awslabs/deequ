// Column profiler surface: DeequColumnProfilerRelation envelope.

syntax = "proto3";

package com.amazon.deequ.connect;

option java_multiple_files = true;
option java_package = "com.amazon.deequ.connect.proto";

import "common.proto";

// ============================================================================
// DeequColumnProfilerRelation — Spark Connect Relation extension envelope.
// ============================================================================

message DeequColumnProfilerRelation {
  bytes input_relation                               = 1;
  repeated string restrict_to_columns                = 2;
  optional int32 low_cardinality_histogram_threshold = 3;
  bool enable_kll_profiling                          = 4;
  KLLParameters kll_parameters                       = 5;

  // Open-ended: set of supported type names is not closed (deferred from
  // architecture review Candidate 8 pending Deequ team input).
  map<string, string> predefined_types               = 6;
}
