// Deequ Spark Connect wire format — Stage 1 draft.
// Canonical home: deequ/src/main/protobuf/ (see CONTEXT.md → "Canonical schema home").
// Design decisions:
//   ADR-0001 — `oneof` arms per builder method (not per family).
//   ADR-0002 — Stage 1 is a clean wire break; future removals use `reserved`.

syntax = "proto3";

package com.amazon.deequ.connect;

option java_multiple_files = true;
option java_package = "com.amazon.deequ.connect.proto";
option java_outer_classname = "DeequConnectProtos";

// ============================================================================
// Predicate — numeric assertion used by Constraint arms that take one.
// ============================================================================

message Predicate {
  enum CompareOp {
    COMPARE_OP_UNSPECIFIED = 0;
    COMPARE_OP_EQ          = 1;
    COMPARE_OP_NE          = 2;
    COMPARE_OP_GT          = 3;
    COMPARE_OP_GE          = 4;
    COMPARE_OP_LT          = 5;
    COMPARE_OP_LE          = 6;
    COMPARE_OP_BETWEEN     = 7;
  }

  CompareOp op                 = 1;
  optional double value        = 2;  // EQ, NE, GT, GE, LT, LE
  optional double lower_bound  = 3;  // BETWEEN
  optional double upper_bound  = 4;  // BETWEEN

  reserved "operator";  // renamed to `op`
}

// ============================================================================
// Spec submessages — payload bundles reused across Constraint `oneof` arms.
// (See CONTEXT.md → "Spec submessage" and ADR-0001.)
// ============================================================================

// Single column, no assertion (server applies implicit `x == 1.0`).
// Used by isComplete, isUnique.
message ColumnSpec {
  string column = 1;
}

// Single column + numeric assertion.
// Used by hasCompleteness, hasMin, hasMax, hasMean, hasSum,
// hasStandardDeviation, hasMinLength, hasMaxLength, hasEntropy,
// hasApproxCountDistinct, containsCreditCardNumber, containsEmail,
// containsURL, containsSocialSecurityNumber, isNonNegative, isPositive.
message ColumnAssertionSpec {
  string column = 1;
  Predicate assertion = 2;
}

// List of columns, no assertion. Used by areComplete, areUnique.
message ColumnsSpec {
  repeated string columns = 1;
}

// List of columns + numeric assertion. Used by haveCompleteness,
// hasUniqueness, hasDistinctness, hasUniqueValueRatio.
message ColumnsAssertionSpec {
  repeated string columns = 1;
  Predicate assertion = 2;
}

// hasSize — assertion only.
message SizeSpec {
  Predicate assertion = 1;
}

// isPrimaryKey — designated column plus optional additional columns.
message PrimaryKeySpec {
  string column = 1;
  repeated string additional_columns = 2;
}

// hasPattern — column + regex + assertion.
message PatternAssertionSpec {
  string column = 1;
  string regex = 2;
  Predicate assertion = 3;
}

// Pair-of-columns constraints with assertion: hasCorrelation, isLessThan,
// isLessThanOrEqualTo, isGreaterThan, isGreaterThanOrEqualTo.
message PairColumnsAssertionSpec {
  string column_a = 1;
  string column_b = 2;
  Predicate assertion = 3;
}

// hasApproxQuantile — column + quantile + assertion.
message QuantileAssertionSpec {
  string column = 1;
  optional double quantile = 2;  // (0,1); server default 0.5 if unset
  Predicate assertion = 3;
}

// isContainedIn — column + allowed values + assertion.
message AllowedValuesSpec {
  string column = 1;
  repeated string allowed_values = 2;
  Predicate assertion = 3;
}

// satisfies — SQL condition + name + assertion.
message SatisfiesSpec {
  string column_condition = 1;
  string constraint_name  = 2;
  Predicate assertion     = 3;
}

// ============================================================================
// Constraint — a single data-quality rule.
// ============================================================================

message Constraint {
  string hint  = 1;
  string where = 2;

  oneof body {
    // Completeness
    ColumnSpec               is_complete             = 10;
    ColumnAssertionSpec      has_completeness        = 11;
    ColumnsSpec              are_complete            = 12;
    ColumnsAssertionSpec     have_completeness       = 13;

    // Size
    SizeSpec                 has_size                = 14;

    // Uniqueness / distinctness
    ColumnSpec               is_unique               = 15;
    ColumnsAssertionSpec     has_uniqueness          = 16;
    ColumnsSpec              are_unique              = 17;
    PrimaryKeySpec           is_primary_key          = 18;
    ColumnsAssertionSpec     has_distinctness        = 19;
    ColumnsAssertionSpec     has_unique_value_ratio  = 20;

    // Statistical
    ColumnAssertionSpec      has_min                 = 21;
    ColumnAssertionSpec      has_max                 = 22;
    ColumnAssertionSpec      has_mean                = 23;
    ColumnAssertionSpec      has_sum                 = 24;
    ColumnAssertionSpec      has_standard_deviation  = 25;

    // Length
    ColumnAssertionSpec      has_min_length          = 26;
    ColumnAssertionSpec      has_max_length          = 27;

    // Quantile
    QuantileAssertionSpec    has_approx_quantile     = 28;

    // Information theory
    ColumnAssertionSpec      has_entropy             = 29;

    // Correlation
    PairColumnsAssertionSpec has_correlation         = 30;

    // Pattern matching
    PatternAssertionSpec     has_pattern                       = 31;
    ColumnAssertionSpec      contains_credit_card_number       = 32;
    ColumnAssertionSpec      contains_email                    = 33;
    ColumnAssertionSpec      contains_url                      = 34;
    ColumnAssertionSpec      contains_social_security_number   = 35;

    // SQL condition
    SatisfiesSpec            satisfies                         = 36;

    // Membership
    AllowedValuesSpec        is_contained_in                   = 37;

    // Sign
    ColumnAssertionSpec      is_non_negative                   = 38;
    ColumnAssertionSpec      is_positive                       = 39;

    // Inter-column comparison
    PairColumnsAssertionSpec is_less_than                      = 40;
    PairColumnsAssertionSpec is_less_than_or_equal_to          = 41;
    PairColumnsAssertionSpec is_greater_than                   = 42;
    PairColumnsAssertionSpec is_greater_than_or_equal_to       = 43;

    // Cardinality estimation
    ColumnAssertionSpec      has_approx_count_distinct         = 44;
  }

  // ADR-0002 — names removed from parent in the Stage-1 break.
  reserved "type", "column", "columns", "assertion", "pattern",
           "column_condition", "constraint_name", "allowed_values", "quantile";
}

// ============================================================================
// Check — a named collection of constraints.
// ============================================================================

enum CheckLevel {
  CHECK_LEVEL_UNSPECIFIED = 0;
  CHECK_LEVEL_ERROR       = 1;
  CHECK_LEVEL_WARNING     = 2;
}

message Check {
  CheckLevel level                 = 1;
  string description               = 2;
  repeated Constraint constraints  = 3;
}

// ============================================================================
// Analyzer specs — payload bundles reused across Analyzer `oneof` arms.
// `where` lives on the Analyzer parent (most analyzers accept it).
// ============================================================================

// Marker spec for analyzers whose only parameter is `where` (Size).
message EmptySpec {}

// Single-column analyzers (no assertion; Analyzer's `where` applies):
// Completeness, Mean, Sum, StandardDeviation, Minimum, Maximum,
// MinLength, MaxLength, ApproxCountDistinct, Entropy, DataType.
message ColumnAnalyzerSpec {
  string column = 1;
}

// Multi-column analyzers: Uniqueness, Distinctness, UniqueValueRatio,
// CountDistinct, MutualInformation.
message ColumnsAnalyzerSpec {
  repeated string columns = 1;
}

// Pair-of-columns analyzer (Correlation).
message PairColumnsAnalyzerSpec {
  string column_a = 1;
  string column_b = 2;
}

// ApproxQuantile (single quantile).
message ApproxQuantileSpec {
  string column                  = 1;
  optional double quantile       = 2;  // (0,1); server default 0.5 if unset
  optional double relative_error = 3;  // (0,1); server default 0.01 if unset
}

// ApproxQuantiles (multiple quantiles).
message ApproxQuantilesSpec {
  string column                  = 1;
  repeated double quantiles      = 2;  // server default [0.25, 0.5, 0.75] if empty
  optional double relative_error = 3;  // (0,1); server default 0.01 if unset
}

// Histogram.
message HistogramSpec {
  string column = 1;
  optional int32 max_detail_bins = 2;  // server default Histogram.MaximumAllowedDetailBins
}

// Compliance analyzer: instance name + SQL predicate string.
// (`predicate` here is a SQL boolean expression, not a numeric assertion.)
message ComplianceAnalyzerSpec {
  string instance  = 1;  // metric name (NOT a column reference)
  string predicate = 2;  // SQL boolean expression
}

// PatternMatch analyzer.
message PatternMatchSpec {
  string column  = 1;
  string pattern = 2;  // regex
}

// ============================================================================
// Analyzer — computes a metric on data.
// ============================================================================

message Analyzer {
  // Optional SQL WHERE filter. Ignored by analyzers that don't support it
  // (today: ApproxQuantile, ApproxQuantiles, CountDistinct, Histogram,
  // MutualInformation).
  string where = 1;

  oneof body {
    // No-parameter (only `where`)
    EmptySpec                size                   = 10;

    // Single-column analyzers
    ColumnAnalyzerSpec       completeness           = 11;
    ColumnAnalyzerSpec       mean                   = 12;
    ColumnAnalyzerSpec       sum                    = 13;
    ColumnAnalyzerSpec       standard_deviation     = 14;
    ColumnAnalyzerSpec       minimum                = 15;
    ColumnAnalyzerSpec       maximum                = 16;
    ColumnAnalyzerSpec       min_length             = 17;
    ColumnAnalyzerSpec       max_length             = 18;
    ColumnAnalyzerSpec       approx_count_distinct  = 19;
    ColumnAnalyzerSpec       entropy                = 20;
    ColumnAnalyzerSpec       data_type              = 21;

    // Multi-column analyzers
    ColumnsAnalyzerSpec      uniqueness             = 22;
    ColumnsAnalyzerSpec      distinctness           = 23;
    ColumnsAnalyzerSpec      unique_value_ratio     = 24;
    ColumnsAnalyzerSpec      count_distinct         = 25;
    ColumnsAnalyzerSpec      mutual_information     = 26;

    // Pair-of-columns analyzer
    PairColumnsAnalyzerSpec  correlation            = 27;

    // Approx quantile analyzers
    ApproxQuantileSpec       approx_quantile        = 28;
    ApproxQuantilesSpec      approx_quantiles       = 29;

    // Specialised analyzers
    HistogramSpec            histogram              = 30;
    ComplianceAnalyzerSpec   compliance             = 31;
    PatternMatchSpec         pattern_match          = 32;
  }

  // ADR-0002 — names removed from parent in the Stage-1 break.
  reserved "type", "column", "columns", "quantile", "relative_error",
           "pattern", "max_detail_bins", "kll_parameters";
}

// ============================================================================
// KLL Sketch parameters — used by ColumnProfilerRelation and
// ConstraintSuggestionRelation.
// ============================================================================

message KLLParameters {
  optional int32  sketch_size       = 1;
  optional double shrinking_factor  = 2;
  optional int32  number_of_buckets = 3;
}

// ============================================================================
// Constraint Suggestion rule sets — see CONTEXT.md.
// ============================================================================

enum ConstraintRuleSet {
  CONSTRAINT_RULE_SET_UNSPECIFIED = 0;
  CONSTRAINT_RULE_SET_DEFAULT     = 1;
  CONSTRAINT_RULE_SET_STRING      = 2;
  CONSTRAINT_RULE_SET_NUMERICAL   = 3;
  CONSTRAINT_RULE_SET_COMMON      = 4;
  CONSTRAINT_RULE_SET_EXTENDED    = 5;
}

// ============================================================================
// Top-level request envelopes — Spark Connect Relation extensions.
// ============================================================================
//
// Every envelope carries `wire_format_version`. The client populates it from
// a constant bundled with its generated stubs; the plugin asserts equality
// before unpacking. Mismatches are returned as structured errors rather than
// proto-parse failures. See ADR-0004.
//
// Stage 1 sets WIRE_FORMAT_VERSION = "deequ-connect/2".

message DeequVerificationRelation {
  string wire_format_version            = 1;
  bytes input_relation                  = 2;
  repeated Check checks                 = 3;
  repeated Analyzer required_analyzers  = 4;
}

message DeequAnalysisRelation {
  string wire_format_version  = 1;
  bytes input_relation        = 2;
  repeated Analyzer analyzers = 3;
}

message DeequColumnProfilerRelation {
  string wire_format_version                         = 1;
  bytes input_relation                               = 2;
  repeated string restrict_to_columns                = 3;
  optional int32 low_cardinality_histogram_threshold = 4;
  bool enable_kll_profiling                          = 5;
  KLLParameters kll_parameters                       = 6;

  // Open-ended for now — set of supported type names is not closed.
  // (See architecture review Candidate 8; deferred pending Deequ team input.)
  map<string, string> predefined_types               = 7;
}

message DeequConstraintSuggestionRelation {
  string wire_format_version                         = 1;
  bytes input_relation                               = 2;
  repeated ConstraintRuleSet constraint_rules        = 3;
  repeated string restrict_to_columns                = 4;
  optional int32 low_cardinality_histogram_threshold = 5;
  bool enable_kll_profiling                          = 6;
  KLLParameters kll_parameters                       = 7;
  map<string, string> predefined_types               = 8;
  optional double testset_ratio                      = 9;   // (0,1) — server-side disabled if unset
  optional int64 testset_split_random_seed           = 10;  // any int64; unset = no seed
  // Note: field name `constraint_rules` is reused with a new type
  // (was `repeated string`, now `repeated ConstraintRuleSet`). Per ADR-0002
  // this is a clean wire break, so reuse rather than rename is appropriate.
}

// ============================================================================
// Removed in Stage 1 (ADR-0002):
//   enum VerificationStatus  — orphan, never used on the wire.
//   enum CheckStatus         — orphan, never used on the wire.
//   enum ConstraintStatus    — orphan, never used on the wire.
//   enum MetricEntity        — orphan, never used on the wire.
// Result return shape remains a Spark DataFrame; if a typed-result envelope
// becomes load-bearing later (non-Spark client), promote orphans then.
// ============================================================================
